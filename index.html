
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Be Sad!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #ffb3c6);
            height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            position: relative;
        }

        /* --- Master Slider viewport container --- */
        .slider-viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* --- Individual View Tracks --- */
        .slide {
            position: absolute;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            will-change: transform;
            transition: transform 1.4s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* --- Smooth Positional Coordinates for the 3 Slides --- */
        #s1 { transform: translate3d(0, 0, 0); }
        #s2 { transform: translate3d(100vw, 0, 0); }
        #s4 { transform: translate3d(100vw, 100vh, 0); } 

        /* --- Slider States --- */
        .show-slide2 #s1 { transform: translate3d(-100vw, 0, 0); }
        .show-slide2 #s2 { transform: translate3d(0, 0, 0); }

        .show-slide4 #s1 { transform: translate3d(-100vw, -100vh, 0); }
        .show-slide4 #s2 { transform: translate3d(0, -100vh, 0); }
        .show-slide4 #s4 { transform: translate3d(0, 0, 0); }

        /* --- Typography Engine --- */
        .header-text {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            color: #fb6f92;
            text-shadow: 3px 3px 0px #fff;
            text-align: center;
            position: absolute;
            top: 12%;
            z-index: 10;
        }

        .drop-in {
            opacity: 0;
            transform: translate3d(0, -100px, 0);
            animation: dropIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 1.8s;
        }

        @keyframes dropIn {
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        .audio-hint {
            display: block;
            font-size: 1.2rem;
            color: #ff8fab;
            margin-top: 15px;
            font-family: 'Nunito', sans-serif;
            text-shadow: none;
        }

        .final-text {
            font-size: 2.3rem;
            padding: 0 30px;
            max-width: 950px;
            line-height: 1.3;
        }

        /* --- Countdown Overlay Styles --- */
        .countdown-text {
            position: absolute;
            bottom: 5%;
            font-size: 0.9rem;
            color: #fb6f92;
            opacity: 0.7;
            font-family: 'Nunito', sans-serif;
            z-index: 20;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* --- Soft Floating Elements --- */
        .float-bounce {
            animation: floaty 3.5s ease-in-out infinite alternate;
        }
        @keyframes floaty {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(0, -15px, 0); }
        }

        /* --- Images Layout --- */
        .image-container {
            position: absolute;
            bottom: 22%;
            z-index: 5;
            will-change: transform;
        }

        #img-container-s2 {
            bottom: 8%; /* Lowered from 22% so the long text doesn't overlap */
        }

        .slide-up-init {
            position: absolute;
            bottom: -350px;
            opacity: 0;
            animation: riseToCenter 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            animation-delay: 2s;
        }

        @keyframes riseToCenter {
            to { opacity: 1; bottom: 30%; }
        }

        .cute-img {
            max-width: 300px;
            width: 75vw;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(251, 111, 146, 0.35);
            border: 10px solid #fff;
            background-color: #fff;
        }

        /* --- Optimized Background Decorations Grid --- */
        .deco-sparkle {
            position: absolute;
            pointer-events: none;
            opacity: 0.75;
            z-index: 1;
            font-size: 2rem;
            animation: shimmer 3s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { transform: scale(0.8); opacity: 0.4; }
            100% { transform: scale(1.1); opacity: 0.9; }
        }

        /* --- GPU Accelerated Particle Elements --- */
        .floating-element {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            will-change: transform;
        }

        .gather-left {
            bottom: 20%; left: -50px;
            animation: flyToCenterLeft 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .gather-right {
            bottom: 20%; right: -50px;
            animation: flyToCenterRight 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes flyToCenterLeft {
            100% { transform: translate3d(50vw, -30vh, 0) scale(1) rotate(180deg); opacity: 0; }
        }
        @keyframes flyToCenterRight {
            100% { transform: translate3d(-50vw, -30vh, 0) scale(1) rotate(-180deg); opacity: 0; }
        }

        .explode-out {
            top: 50%; left: 50%; opacity: 0;
            animation: blastAndFall 2.4s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
        }

        @keyframes blastAndFall {
            0% { transform: translate3d(-50%, -50%, 0) scale(0.3); opacity: 1; }
            25% { transform: translate3d(calc(-50% + var(--x)), calc(-50% + var(--y)), 0) scale(1.2); opacity: 1; }
            100% { transform: translate3d(calc(-50% + var(--x) + var(--driftX)), calc(-50% + var(--y) + 300px), 0) scale(0.7) rotate(180deg); opacity: 0; }
        }

        .heart-fall {
            top: -50px;
            animation: floatDown 2.8s linear forwards;
        }

        @keyframes floatDown {
            100% { transform: translate3d(100px, 105vh, 0) rotate(360deg); opacity: 0; }
        }

        /* === NEW BUTTONS STYLES (only for last slide) === */
        .last-slide-controls {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 30;
        }

        .control-btn {
            padding: 14px 32px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: white;
            background: #fb6f92;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(251, 111, 146, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .control-btn:hover {
            background: #ff8fab;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(251, 111, 146, 0.5);
        }

        .control-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body id="sliderBody">

    <div class="slider-viewport">
        
        <div class="slide" id="s1">
            <h1 class="header-text drop-in">
                DONT BE SADD LOVELYLYY
                <span class="audio-hint">(sorry for everythingng) </span>
            </h1>
            <div class="slide-up-init">
                <img class="cute-img" src="4.webp" alt="Cute 1">
            </div>
            <div class="countdown-text" id="counter1">next slide in 9s...</div>
        </div>

        <div class="slide" id="s2">
            <h1 class="header-text float-bounce">UR SO AMAZING YOU HAVE NOTHING TO BE SAD ABOUT, CUZ UR THE BEST PERSON IN THE UNIVERSE</h1>
            <div class="image-container float-bounce" id="img-container-s2">
                <img class="cute-img" src="2.webp" alt="Cute 2">
            </div>
            <div class="countdown-text" id="counter2">next slide in 6s...</div>
        </div>

        <div class="slide" id="s4">
            <h1 class="header-text final-text float-bounce">I'M SO SORRY FOR EVERYTHING, YOURE MY ENTIRE LIFE AND I LOVEEE YOUU SMMMM BROOO 🥺🥺❤️🩹</h1>
            <div class="image-container float-bounce" style="bottom: 18%;">
                <img class="cute-img" src="1.webp" alt="Apology puppy">
            </div>
            <div class="countdown-text" id="counter4">❤️</div>

            <!-- NEW BUTTONS - ONLY ON LAST SLIDE -->
            <div class="last-slide-controls">
                <button class="control-btn" id="playMusicBtn">🎵 PLAY MUSIC</button>
                <button class="control-btn" id="startAgainBtn">🔄 START AGAIN</button>
            </div>
        </div>

    </div>

    <audio id="finalAudio" src="f.mp3" preload="auto"></audio>

    <script>
        const symbols = ['🌸', '💖', '❤️', '💝', '✨', '🌺', '🌷', '🥺', '😭', '🎀'];
        const body = document.getElementById('sliderBody');

        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            playChord(0, [261.63, 329.63, 392.00, 523.25], 2.5); 
            playChord(3, [293.66, 349.23, 440.00, 587.33], 2.5); 
            playChord(6, [349.23, 440.00, 523.25, 698.46], 2.5); 
            playChord(9, [392.00, 493.88, 587.33, 783.99], 3.0); 
            playChord(12, [261.63, 329.63, 392.00, 523.25], 4.0); 
        }

        function playChord(startTime, frequencies, duration) {
            frequencies.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
                gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + startTime + 0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + startTime);
                osc.stop(audioCtx.currentTime + startTime + duration);
            });
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        function spawnElement(className, stylePayload) {
            const el = document.createElement('div');
            el.classList.add('floating-element', className);
            el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            Object.assign(el.style, stylePayload);
            document.body.appendChild(el);
            return el;
        }

        function triggerGathering() {
            for (let i = 0; i < 30; i++) {
                spawnElement('gather-left', {
                    fontSize: Math.random() * 15 + 20 + 'px',
                    animationDelay: Math.random() * 0.3 + 's',
                    bottom: Math.random() * 15 + 10 + '%'
                });
                spawnElement('gather-right', {
                    fontSize: Math.random() * 15 + 20 + 'px',
                    animationDelay: Math.random() * 0.3 + 's',
                    bottom: Math.random() * 15 + 10 + '%'
                });
            }
            setTimeout(() => {
                document.querySelectorAll('.gather-left, .gather-right').forEach(el => el.remove());
            }, 1300);
        }

        function triggerCenterExplosion() {
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 65; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 200 + 90; 
                const x = Math.cos(angle) * distance + 'px';
                const y = Math.sin(angle) * distance + 'px';
                const driftX = (Math.random() * 100 - 50) + 'px';

                const el = document.createElement('div');
                el.classList.add('floating-element', 'explode-out');
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.fontSize = Math.random() * 15 + 18 + 'px';
                el.style.setProperty('--x', x);
                el.style.setProperty('--y', y);
                el.style.setProperty('--driftX', driftX);
                
                fragment.appendChild(el);
            }
            document.body.appendChild(fragment);

            setTimeout(() => {
                document.querySelectorAll('.explode-out').forEach(el => el.remove());
            }, 2500);
        }

        function startFallingHearts() {
            let count = 0;
            const heartInterval = setInterval(() => {
                if(count++ > 45) { clearInterval(heartInterval); return; }
                const el = spawnElement('heart-fall', {
                    left: Math.random() * 95 + 'vw',
                    fontSize: Math.random() * 15 + 15 + 'px',
                    animationDuration: Math.random() * 0.8 + 2 + 's'
                });
                setTimeout(() => el.remove(), 2900);
            }, 60);
        }

        function triggerLastSlideHearts() {
            let count = 0;
            const finalHeartInterval = setInterval(() => {
                if(count++ > 80) { clearInterval(finalHeartInterval); return; }
                const el = spawnElement('heart-fall', {
                    left: Math.random() * 95 + 'vw',
                    fontSize: Math.random() * 25 + 20 + 'px', 
                    animationDuration: Math.random() * 1.0 + 1.5 + 's'
                });
                el.innerText = '❤️';
                setTimeout(() => el.remove(), 2400);
            }, 40);
        }

        function addStaticDeco() {
            const items = ['✨', '🌟', '🌸', '🧸', '🥺', '💖', '🤍', '🩹'];
            const slides = ['s2', 's4'];
            
            slides.forEach(id => {
                const slideEl = document.getElementById(id);
                for(let i=0; i<12; i++) {
                    const item = document.createElement('div');
                    item.classList.add('deco-sparkle');
                    item.innerText = items[Math.floor(Math.random() * items.length)];
                    item.style.left = Math.random() * 85 + 5 + '%';
                    item.style.top = Math.random() * 75 + 15 + '%';
                    item.style.animationDelay = (Math.random() * 2) + 's';
                    slideEl.appendChild(item);
                }
            });
        }

        function handleCountdowns() {
            let slide1Time = 9; 
            let slide2Time = 6; 

            const c1 = document.getElementById('counter1');
            const c2 = document.getElementById('counter2');

            const interval1 = setInterval(() => {
                slide1Time--;
                if (slide1Time >= 0) {
                    c1.innerText = `next slide in ${slide1Time}s...`;
                } else {
                    clearInterval(interval1);
                    startSlide2Countdown();
                }
            }, 1000);

            function startSlide2Countdown() {
                const interval2 = setInterval(() => {
                    slide2Time--;
                    if (slide2Time >= 0) {
                        c2.innerText = `next slide in ${slide2Time}s...`;
                    } else {
                        clearInterval(interval2);
                    }
                }, 1000);
            }
        }

        // === NEW FUNCTIONALITY ===
        function playMusic() {
            const finalAudio = document.getElementById('finalAudio');
            finalAudio.currentTime = 0;
            finalAudio.play().catch(err => console.log("Audio playback failed:", err));
        }

        function startAgain() {
            // Reset everything
            const finalAudio = document.getElementById('finalAudio');
            finalAudio.pause();
            finalAudio.currentTime = 0;

            // Reset body classes
            body.className = '';

            // Restart all animations and timelines
            document.querySelectorAll('.floating-element').forEach(el => el.remove());
            
            // Restart the whole experience
            setTimeout(() => {
                location.reload();
            }, 50);
        }

        window.addEventListener('DOMContentLoaded', () => {
            addStaticDeco();
            triggerGathering();
            handleCountdowns();

            setTimeout(triggerCenterExplosion, 1000);
            setTimeout(startFallingHearts, 1100);

            // Transitions
            setTimeout(() => body.className = 'show-slide2', 9000); 
            setTimeout(() => { 
                body.className = 'show-slide4'; 
                triggerLastSlideHearts(); 
                
                // Play final audio clip file (original behavior)
                const finalAudio = document.getElementById('finalAudio');
                finalAudio.play().catch(err => console.log("Audio waiting for user interaction:", err));
            }, 15000);

            // Button listeners
            document.getElementById('playMusicBtn').addEventListener('click', playMusic);
            document.getElementById('startAgainBtn').addEventListener('click', startAgain);
        });
    </script>
</body>
</html>
